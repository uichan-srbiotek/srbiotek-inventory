<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>srbiotek 원재료 관리</title>
<link rel="manifest" href="#" />
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #273347;
    --border: #334155;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --danger: #f87171;
    --warning: #fbbf24;
    --success: #34d399;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --radius: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Pretendard', 'Noto Sans KR', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .logo { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; }
  .sync-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 12px; padding: 5px 12px; border-radius: 20px; cursor: pointer; transition: all .2s; }
  .sync-btn:active { background: var(--border); }
  .sync-time { font-size: 11px; color: var(--muted); }

  .tabs { display: flex; gap: 6px; }
  .tab { flex: 1; background: none; border: none; color: var(--muted); font-size: 12px; font-weight: 600; padding: 8px 4px; border-radius: 8px; cursor: pointer; transition: all .2s; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .tab .icon { font-size: 18px; }
  .tab.active { background: var(--surface2); color: var(--accent); }

  main { flex: 1; overflow-y: auto; padding: 16px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 800; line-height: 1; }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 4px; }
  .stat-card.danger .stat-num { color: var(--danger); }
  .stat-card.warning .stat-num { color: var(--warning); }
  .stat-card.ok .stat-num { color: var(--success); }

  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; padding: 11px 16px 11px 40px; outline: none; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .pill { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; color: var(--muted); font-size: 12px; font-weight: 600; padding: 5px 14px; white-space: nowrap; cursor: pointer; flex-shrink: 0; transition: all .2s; }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #0f172a; }

  .mat-list { display: flex; flex-direction: column; gap: 10px; }
  .mat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; transition: border-color .2s; }
  .mat-card.danger { border-left: 3px solid var(--danger); }
  .mat-card.warning { border-left: 3px solid var(--warning); }
  .mat-card.low-usage { border-left: 3px solid var(--danger); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
  .mat-name { font-size: 14px; font-weight: 700; line-height: 1.3; flex: 1; margin-right: 8px; }
  .badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .badge.danger { background: rgba(248,113,113,.15); color: var(--danger); }
  .badge.warning { background: rgba(251,191,36,.15); color: var(--warning); }
  .badge.ok { background: rgba(52,211,153,.15); color: var(--success); }

  .card-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
  .meta-item { font-size: 12px; color: var(--muted); }
  .meta-item span { color: var(--text); font-weight: 600; }

  .usage-bar-wrap { margin-top: 10px; }
  .usage-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .usage-bar-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .usage-bar-fill { height: 100%; border-radius: 3px; transition: width .5s; }

  .exp-section { margin-bottom: 20px; }
  .section-title { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding: 0 2px; }

  /* 스캔 탭 */
  #qr-reader { width: 100%; margin-bottom: 16px; border-radius: 14px; overflow: hidden; display: none; }
  #qr-reader video { border-radius: 14px; }
  #qr-reader img { display: none !important; }

  .scan-btn { width: 100%; background: var(--surface2); border: 2px dashed var(--accent); border-radius: 14px; color: var(--accent); font-size: 15px; font-weight: 700; padding: 20px; margin-bottom: 16px; cursor: pointer; }

  .scan-input-wrap { display: flex; gap: 10px; margin-bottom: 16px; }
  .scan-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; padding: 12px 16px; outline: none; }
  .scan-input:focus { border-color: var(--accent); }

  .btn-primary { background: var(--accent); border: none; border-radius: 10px; color: #0f172a; font-size: 14px; font-weight: 800; padding: 12px 20px; cursor: pointer; white-space: nowrap; transition: opacity .2s; }
  .btn-primary:active { opacity: .8; }

  /* ── 스캔 결과 카드 (새 디자인) ── */
  .scan-result { display: flex; flex-direction: column; gap: 12px; }
  .scan-result-header { font-size: 13px; font-weight: 700; color: var(--accent); padding: 4px 2px 8px; }

  .scan-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .scan-card-top { background: var(--surface2); padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
  .scan-rank { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; flex-shrink: 0; }
  .scan-rank.rank-1 { background: var(--danger); color: white; }
  .scan-rank.rank-2 { background: var(--warning); color: #0f172a; }
  .scan-rank.rank-3 { background: var(--success); color: #0f172a; }
  .scan-rank.rank-n { background: var(--border); color: var(--muted); }
  .scan-card-title { flex: 1; }
  .scan-card-name { font-size: 14px; font-weight: 700; line-height: 1.3; }
  .scan-card-urgency { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .scan-card-body { padding: 14px 16px; }
  .scan-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
  .scan-detail-item { font-size: 12px; color: var(--muted); }
  .scan-detail-item span { display: block; color: var(--text); font-weight: 600; margin-top: 1px; font-size: 13px; }
  .scan-usage-bar { margin-top: 12px; }
  .scan-usage-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .scan-usage-bar-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .scan-usage-bar-fill { height: 100%; border-radius: 3px; }

  .loading { text-align: center; padding: 48px 20px; color: var(--muted); }
  .loading .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: flex; align-items: flex-end; padding: 0; }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 24px 20px 40px; width: 100%; }
  .modal h3 { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
  .modal input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 13px; padding: 12px 14px; outline: none; margin-bottom: 12px; }
  .modal input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 10px; }
  .btn-secondary { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; font-weight: 700; padding: 12px; cursor: pointer; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="logo">SRBIOTEK</div>
      <div class="sync-time" id="syncTime">데이터 미로드</div>
    </div>
    <button class="sync-btn" onclick="loadData()">🔄 새로고침</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('usage', this)"><span class="icon">📊</span>사용량</button>
    <button class="tab" onclick="switchTab('expiry', this)"><span class="icon">🔔</span>유통기한</button>
    <button class="tab" onclick="switchTab('scan', this)"><span class="icon">📷</span>바코드</button>
  </div>
</header>

<main>
  <!-- 사용량 패널 -->
  <div class="panel active" id="panel-usage">
    <div class="stats-row">
      <div class="stat-card danger"><div class="stat-num" id="s-danger">-</div><div class="stat-label">20% 미만</div></div>
      <div class="stat-card warning"><div class="stat-num" id="s-warning">-</div><div class="stat-label">20~50%</div></div>
      <div class="stat-card ok"><div class="stat-num" id="s-ok">-</div><div class="stat-label">50% 이상</div></div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="원료명, 품목코드 검색" id="usageSearch" oninput="renderUsage()">
    </div>
    <div class="filter-row">
      <button class="pill active" onclick="setFilter('all', this)">전체</button>
      <button class="pill" onclick="setFilter('danger', this)">🔴 20% 미만</button>
      <button class="pill" onclick="setFilter('warning', this)">🟡 20~50%</button>
      <button class="pill" onclick="setFilter('ok', this)">🟢 50% 이상</button>
    </div>
    <div class="mat-list" id="usageList">
      <div class="loading"><div class="spinner"></div>API 주소를 설정해주세요</div>
    </div>
  </div>

  <!-- 유통기한 패널 -->
  <div class="panel" id="panel-expiry">
    <div class="exp-section"><div class="section-title">🚨 이미 만료 / 1개월 미만</div><div class="mat-list" id="exp-critical"></div></div>
    <div class="exp-section"><div class="section-title">⚠️ 3개월 이내</div><div class="mat-list" id="exp-3m"></div></div>
    <div class="exp-section"><div class="section-title">📌 6개월 이내</div><div class="mat-list" id="exp-6m"></div></div>
    <div class="exp-section"><div class="section-title">✅ 6개월 이상</div><div class="mat-list" id="exp-ok"></div></div>
    <div class="exp-section"><div class="section-title">🗑️ 폐기 처리됨</div><div class="mat-list" id="exp-disposed"></div></div>
  </div>

  <!-- 바코드 스캔 패널 -->
  <div class="panel" id="panel-scan">
    <div id="qr-reader"></div>
    <button class="scan-btn" id="cameraBtn" onclick="startCamera()">📷 카메라로 바코드 스캔</button>
    <div style="text-align:center;color:var(--muted);font-size:12px;margin-bottom:12px;">— 또는 직접 입력 —</div>
    <div class="scan-input-wrap">
      <input class="scan-input" type="text" id="scanInput" placeholder="품목코드 or 롯트번호 (예: 30004)" onkeydown="if(event.key==='Enter') doScan()">
      <button class="btn-primary" onclick="doScan()">검색</button>
    </div>
    <div id="scanResult"></div>
  </div>
</main>

<!-- API 설정 모달 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>⚙️ API 주소 설정</h3>
    <p>Google Apps Script 배포 후 받은<br>웹앱 URL을 입력해주세요</p>
    <input type="url" id="apiUrlInput" placeholder="https://script.google.com/macros/s/.../exec">
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn-primary" style="flex:1" onclick="saveApi()">저장 및 데이터 로드</button>
    </div>
  </div>
</div>

<script>
let API_URL = localStorage.getItem('srbiotek_api') || '';
let allData = [];
let currentFilter = 'all';
let html5QrCode = null;

window.onload = () => {
  if (!API_URL) {
    document.getElementById('modalOverlay').classList.remove('hidden');
  } else {
    loadData();
  }
};

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
}

function saveApi() {
  const url = document.getElementById('apiUrlInput').value.trim();
  if (!url) return alert('URL을 입력하세요');
  API_URL = url;
  localStorage.setItem('srbiotek_api', url);
  closeModal();
  loadData();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab !== 'scan') stopCamera();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderUsage();
}

async function loadData() {
  if (!API_URL) { document.getElementById('modalOverlay').classList.remove('hidden'); return; }
  document.getElementById('usageList').innerHTML = '<div class="loading"><div class="spinner"></div>데이터 불러오는 중...</div>';
  try {
    const res = await fetch(`${API_URL}?action=getAll&showDisposed=true`);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || '오류');
    allData = json.items;
    const now = new Date().toLocaleString('ko-KR', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('syncTime').textContent = `마지막 동기화 ${now}`;
    renderUsage();
    renderExpiry();
  } catch(e) {
    document.getElementById('usageList').innerHTML = `<div class="empty">❌ 오류: ${e.message}<br><br><small>API 주소를 확인하거나 새로고침을 눌러주세요</small></div>`;
  }
}

function renderUsage() {
  const q = document.getElementById('usageSearch').value.toLowerCase();
  let filtered = allData.filter(d => {
    const matchSearch = !q || d.name.toLowerCase().includes(q) || d.code.toLowerCase().includes(q);
    if (!matchSearch) return false;
    if (currentFilter === 'danger') return d.usageRate !== null && d.usageRate < 20;
    if (currentFilter === 'warning') return d.usageRate !== null && d.usageRate >= 20 && d.usageRate < 50;
    if (currentFilter === 'ok') return d.usageRate !== null && d.usageRate >= 50;
    return true;
  });
  filtered.sort((a, b) => (a.usageRate ?? 999) - (b.usageRate ?? 999));
  const danger = allData.filter(d => d.usageRate !== null && d.usageRate < 20).length;
  const warning = allData.filter(d => d.usageRate !== null && d.usageRate >= 20 && d.usageRate < 50).length;
  const ok = allData.filter(d => d.usageRate !== null && d.usageRate >= 50).length;
  document.getElementById('s-danger').textContent = danger;
  document.getElementById('s-warning').textContent = warning;
  document.getElementById('s-ok').textContent = ok;
  if (!filtered.length) { document.getElementById('usageList').innerHTML = '<div class="empty">검색 결과가 없습니다</div>'; return; }
  document.getElementById('usageList').innerHTML = filtered.map(d => {
    const rate = d.usageRate;
    const isDanger = rate !== null && rate < 20;
    const isWarning = rate !== null && rate >= 20 && rate < 50;
    const barColor = isDanger ? 'var(--danger)' : isWarning ? 'var(--warning)' : 'var(--success)';
    const badgeClass = isDanger ? 'danger' : isWarning ? 'warning' : 'ok';
    const badgeText = rate !== null ? `${rate}%` : '-';
    const cardClass = isDanger ? 'low-usage' : '';
    return `
    <div class="mat-card ${cardClass}">
      <div class="card-top"><div class="mat-name">${d.name}</div><span class="badge ${badgeClass}">${badgeText}</span></div>
      <div class="card-meta">
        <div class="meta-item">코드 <span>${d.code}</span></div>
        <div class="meta-item">규격 <span>${d.spec || '-'}</span></div>
        <div class="meta-item">재고 <span>${d.stock || '-'}</span></div>
        <div class="meta-item">유통기한 <span>${d.expDate || '-'}</span></div>
      </div>
      ${rate !== null ? `
      <div class="usage-bar-wrap">
        <div class="usage-bar-label"><span>사용비율</span><span>${rate}% / 100%</span></div>
        <div class="usage-bar-bg"><div class="usage-bar-fill" style="width:${Math.min(rate,100)}%;background:${barColor}"></div></div>
      </div>` : ''}
    </div>`;
  }).join('');
}

function renderExpiry() {
  const active = allData.filter(d => d.expDate && !d.isDisposed);
  const disposed = allData.filter(d => d.expDate && d.isDisposed);

  const sorted = [...active].sort((a,b) => (a.daysLeft??9999) - (b.daysLeft??9999));
  const critical = sorted.filter(d => d.daysLeft !== null && d.daysLeft <= 30);
  const m3 = sorted.filter(d => d.daysLeft !== null && d.daysLeft > 30 && d.daysLeft <= 90);
  const m6 = sorted.filter(d => d.daysLeft !== null && d.daysLeft > 90 && d.daysLeft <= 180);
  const ok = sorted.filter(d => d.daysLeft !== null && d.daysLeft > 180);
  ['critical','3m','6m','ok'].forEach((key, i) => {
    const list = [critical, m3, m6, ok][i];
    const el = document.getElementById('exp-' + key);
    if (!list.length) { el.innerHTML = '<div class="empty" style="padding:16px">해당 없음</div>'; return; }
    el.innerHTML = list.map(d => {
      const cls = d.daysLeft <= 0 ? 'danger' : d.daysLeft <= 30 ? 'danger' : d.daysLeft <= 90 ? 'warning' : d.daysLeft <= 180 ? 'warning' : 'ok';
      const daysText = d.daysLeft <= 0 ? `만료 ${Math.abs(d.daysLeft)}일 경과` : `D-${d.daysLeft}`;
      return `
      <div class="mat-card ${cls === 'danger' ? 'danger' : cls === 'warning' ? 'warning' : ''}">
        <div class="card-top"><div class="mat-name">${d.name}</div><span class="badge ${cls}">${daysText}</span></div>
        <div class="card-meta">
          <div class="meta-item">코드 <span>${d.code}</span></div>
          <div class="meta-item">유통기한 <span>${d.expDate}</span></div>
          <div class="meta-item">제조일 <span>${d.mfgDate || '-'}</span></div>
          <div class="meta-item">롯트번호 <span>${d.lotNo || '-'}</span></div>
          <div class="meta-item">시험번호 <span>${d.testNo || '-'}</span></div>
          <div class="meta-item">사용비율 <span>${d.usageRate !== null ? d.usageRate + '%' : '-'}</span></div>
        </div>
        <button class="btn-secondary" style="margin-top:10px;width:100%" onclick="toggleDisposal('${d.sheetName}', ${d.row}, true, this)">🗑️ 숨기기(폐기 처리)</button>
      </div>`;
    }).join('');
  });

  const dispEl = document.getElementById('exp-disposed');
  if (!disposed.length) {
    dispEl.innerHTML = '<div class="empty" style="padding:16px">해당 없음</div>';
  } else {
    dispEl.innerHTML = disposed.map(d => `
    <div class="mat-card">
      <div class="card-top"><div class="mat-name">${d.name}</div><span class="badge warning">${d.disposalLabel}</span></div>
      <div class="card-meta">
        <div class="meta-item">코드 <span>${d.code}</span></div>
        <div class="meta-item">유통기한 <span>${d.expDate}</span></div>
        <div class="meta-item">롯트번호 <span>${d.lotNo || '-'}</span></div>
      </div>
      <button class="btn-secondary" style="margin-top:10px;width:100%" onclick="toggleDisposal('${d.sheetName}', ${d.row}, false, this)">↩️ 복원(다시 보이기)</button>
    </div>`).join('');
  }
}

async function toggleDisposal(sheetName, row, dispose, btn) {
  btn.disabled = true;
  btn.textContent = '처리 중...';
  let label = '';
  if (dispose) {
    const now = new Date();
    const yy = String(now.getFullYear()).slice(2);
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    label = `${yy}년 ${mm}월폐기 품목`;
  }
  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: dispose ? 'setDisposal' : 'clearDisposal',
        sheetName, row, label
      })
    });
    await loadData();
  } catch (e) {
    alert('처리 중 오류: ' + e.message);
    btn.disabled = false;
  }
}

// ── 바코드/QR 스캔 ──
function startCamera() {
  const qrReader = document.getElementById('qr-reader');
  const btn = document.getElementById('cameraBtn');
  qrReader.style.display = 'block';
  btn.style.display = 'none';

  html5QrCode = new Html5Qrcode("qr-reader");
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    (decodedText) => {
      stopCamera();
      document.getElementById('scanInput').value = decodedText;
      doScan();
    },
    () => {}
  ).catch(() => {
    alert('카메라 권한을 허용해주세요!\n설정 > 사이트 설정 > 카메라');
    stopCamera();
  });
}

function stopCamera() {
  if (html5QrCode) {
    html5QrCode.stop().catch(() => {});
    html5QrCode = null;
  }
  document.getElementById('qr-reader').style.display = 'none';
  document.getElementById('cameraBtn').style.display = 'block';
}

// ── 부분 검색 매칭 함수 ──
// 입력값이 코드/롯트번호에 포함되면 매칭 (대소문자 무시)
function matchItem(d, query) {
  const q = query.toLowerCase();
  const codeMatch = d.code && d.code.toLowerCase().includes(q);
  const lotMatch = d.lotNo && d.lotNo.toLowerCase().includes(q);
  return codeMatch || lotMatch;
}

async function doScan() {
  const raw = document.getElementById('scanInput').value.trim();
  if (!raw) return;
  document.getElementById('scanResult').innerHTML = '<div class="loading"><div class="spinner"></div>검색 중...</div>';

  // 로컬 데이터에서 부분 매칭 검색
  const matches = allData.filter(d => matchItem(d, raw))
    .sort((a, b) => (a.daysLeft ?? 9999) - (b.daysLeft ?? 9999));

  if (matches.length) {
    renderScanResult(matches, raw);
    return;
  }

  // 로컬에 없으면 API 요청
  try {
    const res = await fetch(`${API_URL}?action=scan&code=${encodeURIComponent(raw)}`);
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    renderScanResult(json.matches, raw);
  } catch(e) {
    document.getElementById('scanResult').innerHTML = `<div class="empty">❌ ${e.message}</div>`;
  }
}

function renderScanResult(matches, query) {
  if (!matches.length) {
    document.getElementById('scanResult').innerHTML = `
      <div class="empty">
        🔍 "<strong>${query}</strong>"에 해당하는<br>원재료를 찾을 수 없습니다<br><br>
        <small>품목코드 또는 롯트번호를 확인해주세요</small>
      </div>`;
    return;
  }

  const cards = matches.map((d, i) => {
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-n';
    const urgency = i === 0 ? '⚡ 먼저 사용' : i === 1 ? '다음 사용' : `${i+1}번째`;
    const daysText = d.daysLeft !== null
      ? (d.daysLeft <= 0 ? `만료 ${Math.abs(d.daysLeft)}일 경과` : `D-${d.daysLeft}`)
      : '-';

    const rate = d.usageRate;
    const barColor = rate === null ? 'var(--muted)'
      : rate < 20 ? 'var(--danger)'
      : rate < 50 ? 'var(--warning)'
      : 'var(--success)';

    return `
    <div class="scan-card">
      <div class="scan-card-top">
        <div class="scan-rank ${rankClass}">${i + 1}</div>
        <div class="scan-card-title">
          <div class="scan-card-name">${d.name}</div>
          <div class="scan-card-urgency">${urgency}</div>
        </div>
      </div>
      <div class="scan-card-body">
        <div class="scan-detail-grid">
          <div class="scan-detail-item">코드<span>${d.code || '-'}</span></div>
          <div class="scan-detail-item">유통기한<span>${d.expDate || '-'} (${daysText})</span></div>
          <div class="scan-detail-item">제조일<span>${d.mfgDate || '-'}</span></div>
          <div class="scan-detail-item">롯트번호<span>${d.lotNo || '-'}</span></div>
          <div class="scan-detail-item">시험번호<span>${d.testNo || '-'}</span></div>
          <div class="scan-detail-item">사용비율<span>${rate !== null ? rate + '%' : '-'}</span></div>
        </div>
        ${rate !== null ? `
        <div class="scan-usage-bar">
          <div class="scan-usage-bar-label"><span>사용비율</span><span>${rate}%</span></div>
          <div class="scan-usage-bar-bg">
            <div class="scan-usage-bar-fill" style="width:${Math.min(rate,100)}%;background:${barColor}"></div>
          </div>
        </div>` : ''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('scanResult').innerHTML = `
    <div class="scan-result">
      <div class="scan-result-header">📦 선입선출 순서 — "${query}" 검색결과 ${matches.length}건</div>
      ${cards}
    </div>`;
}
</script>
